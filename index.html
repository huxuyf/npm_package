<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>地图坐标拾取器</title>
  
  <link rel="stylesheet" href="css/leaflet.css"/>
  <link rel="stylesheet" href="css/all.min.css"/>
  <link rel="stylesheet" href="css/leaflet.awesome-markers.css"/>
  <link rel="stylesheet" href="css/Control.FullScreen.css"/>
  <link rel="stylesheet" href="css/Control.MiniMap.css"/>

  <script src="js/leaflet.js"></script>
  <script src="js/jquery.min.js"></script>
  <script src="js/leaflet.awesome-markers.js"></script>
  <script src="js/Control.FullScreen.min.js"></script>
  <script src="js/Control.MiniMap.js"></script>
  <script src="js/xlsx.full.min.js"></script>


  <style>
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
    #map { width: 100%; height: 100%; }
    
    /* 顶部上传面板 */
    #upload-panel {
      position: absolute; top: 12px; left: 60px; z-index: 1000;
      background: rgba(255, 255, 255, 0.95); padding: 10px 14px; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 14px;
      backdrop-filter: blur(4px); flex-wrap: wrap;
    }
    .upload-btn { position: relative; overflow: hidden; }
    .upload-btn input[type="file"] {
      position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
    }
    .btn-primary-custom {
      background: #1890ff; color: white; border: none; padding: 6px 12px;
      border-radius: 4px; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px;
    }
    #status-msg { font-size: 12px; color: #555; line-height: 1.4; }
    #status-msg b { color: #333; }
    .toggle-label { font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; color: #333; }
    .toggle-label input { cursor: pointer; }
  </style>
</head>
<body>

  <!-- 顶部上传面板 -->
  <div id="upload-panel">
    <div class="upload-btn btn-primary-custom">
      <i class="fas fa-file-excel"></i> 导入 Excel
      <input type="file" id="excel-input" accept=".xlsx,.xls,.csv">
    </div>
    
    <label class="toggle-label">
      <input type="checkbox" id="toggle-line" checked> 显示连线
    </label>

    <div id="status-msg">
      <b>格式要求：</b>表头需包含 经度、纬度、标签名 三列，且经纬度需为 BD-09 坐标系。
    </div>
  </div>

  <!-- 地图容器 -->
  <div id="map"></div>

  <script>
    /**
     * 坐标系转换：BD-09 (百度) -> GCJ-02 (高德)
     */
    function bd09ToGcj02(bdLng, bdLat) {
      const x_pi = Math.PI * 3000.0 / 180.0;
      const x = bdLng - 0.0065;
      const y = bdLat - 0.006;
      const z = Math.sqrt(x * x + y * y) - 0.00002 * Math.sin(y * x_pi);
      const theta = Math.atan2(y, x) - 0.000003 * Math.cos(x * x_pi);
      return [z * Math.cos(theta), z * Math.sin(theta)];
    }

    // 1. 初始化地图
    const map = L.map('map', { center: [30.78, 120.29], zoom: 11, zoomControl: true });

    // 2. 高德地图底图配置
    const amapLayer = L.tileLayer(
      'https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
      { subdomains: '1234', maxZoom: 18, attribution: '&copy; 高德地图' }
    ).addTo(map);

    const amapSatelliteLayer = L.tileLayer(
      'https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',
      { subdomains: '1234', maxZoom: 18, attribution: '&copy; 高德地图' }
    );

    L.control.layers({ '高德地图': amapLayer, '高德卫星图': amapSatelliteLayer }, {}, { position: 'topright', collapsed: true }).addTo(map);
    L.control.fullscreen({ position: 'topleft' }).addTo(map);
    
    const miniMapBase = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png');
    L.control.minimap(miniMapBase, { position: 'bottomright', width: 150, height: 150, zoomLevelOffset: -5 }).addTo(map);

    // 3. 动态图层与状态管理
    let markerGroup = L.layerGroup().addTo(map);
    let polylineLayer = null;
    let currentRouteCoords = []; // 存储转换后的坐标，供连线开关调用

    // 4. Excel 导入处理逻辑
    document.getElementById('excel-input').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        try {
          const data = new Uint8Array(event.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          const jsonData = XLSX.utils.sheet_to_json(firstSheet);

          if (jsonData.length === 0) { alert('⚠️ Excel 文件为空，请检查数据'); return; }

          const requiredCols = ['经度', '纬度', '标签名'];
          const missingCols = requiredCols.filter(col => !(col in jsonData[0]));
          if (missingCols.length > 0) {
            alert(`⚠️ 缺少必要列：${missingCols.join(', ')}\n请确保第一行表头包含：经度、纬度、标签名`);
            return;
          }

          // 清空旧数据
          markerGroup.clearLayers();
          if (polylineLayer) { map.removeLayer(polylineLayer); polylineLayer = null; }
          currentRouteCoords = [];

          jsonData.forEach((row, index) => {
            const bdLng = parseFloat(row['经度']);
            const bdLat = parseFloat(row['纬度']);
            const label = String(row['标签名'] || `点位 ${index + 1}`).trim();
            const autoId = index + 1;

            if (!isNaN(bdLng) && !isNaN(bdLat)) {
              const [gcjLng, gcjLat] = bd09ToGcj02(bdLng, bdLat);
              currentRouteCoords.push([gcjLat, gcjLng]);

              const popupContent = `
                <div style="min-width:180px; font-family:Arial, sans-serif;">
                  <h4 style="margin:0 0 8px 0; font-size:14px; color:#333;">📍 ${label}</h4>
                  <p style="margin:4px 0; font-size:11px; color:#666;">
                    <b>原始(BD-09):</b> ${bdLng.toFixed(6)}°, ${bdLat.toFixed(6)}°<br>
                    <b>转换(GCJ-02):</b> ${gcjLng.toFixed(6)}°, ${gcjLat.toFixed(6)}°<br>
                    <b>ID:</b> ${autoId}
                  </p>
                </div>`;

              const pointGroup = L.layerGroup();
              const marker = L.marker([gcjLat, gcjLng], {
                icon: L.AwesomeMarkers.icon({ markerColor: 'red', iconColor: 'white', icon: 'map-marker', prefix: 'fa' })
              }).bindPopup(popupContent, { maxWidth: 220 }).addTo(pointGroup);

              // 鼠标悬停显示经纬度（不显示标签名）
              marker.bindTooltip(`经度：${bdLng.toFixed(6)}°<br>纬度：${bdLat.toFixed(6)}°`, { 
                sticky: true, direction: 'top' 
              });

              L.marker([gcjLat, gcjLng], {
                icon: L.divIcon({
                  html: `<div style="text-align:center; color:white; font-weight:bold; font-size:12px; line-height:24px;">${autoId}</div>`,
                  iconSize: [24, 24], iconAnchor: [12, 12], className: 'empty'
                })
              }).addTo(pointGroup);

              L.circleMarker([gcjLat, gcjLng], {
                color: 'white', fillColor: '#e74c3c', fillOpacity: 1, radius: 12, weight: 2
              }).addTo(pointGroup);

              pointGroup.addTo(markerGroup);
            }
          });

          if (currentRouteCoords.length === 0) {
            alert('⚠️ 未解析到有效坐标数据，请检查格式');
            return;
          }

          // 根据复选框状态决定是否绘制连线
          const showLine = document.getElementById('toggle-line').checked;
          if (showLine && currentRouteCoords.length > 1) {
            polylineLayer = L.polyline(currentRouteCoords, {
              color: '#3498db', dashArray: '10, 10', opacity: 0.7, weight: 3
            }).addTo(map);
          }

          // 自适应缩放至所有点位范围
          map.fitBounds(currentRouteCoords, { padding: [50, 50] });
          document.getElementById('status-msg').innerHTML = `✅ 成功加载 <b>${currentRouteCoords.length}</b> 个点位`;
          setTimeout(() => {
            document.getElementById('status-msg').innerHTML = '';
          }, 5000);

        } catch (err) {
          alert('❌ 解析 Excel 失败：' + err.message);
          console.error(err);
        }
      };
      reader.readAsArrayBuffer(file);
      this.value = '';
    });

    // 5. 连线开关实时切换逻辑
    document.getElementById('toggle-line').addEventListener('change', function() {
      if (this.checked && currentRouteCoords.length > 1) {
        if (!polylineLayer) {
          polylineLayer = L.polyline(currentRouteCoords, {
            color: '#3498db', dashArray: '10, 10', opacity: 0.7, weight: 3
          }).addTo(map);
        }
      } else {
        if (polylineLayer) {
          map.removeLayer(polylineLayer);
          polylineLayer = null;
        }
      }
    });
  </script>
</body>
</html>
